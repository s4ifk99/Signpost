name: Monthly legal aid providers ingest

on:
  schedule:
    # 06:00 UTC on the 2nd day of each month
    - cron: "0 6 2 * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests

      - name: Update legal aid providers data (CSV)
        run: python scripts/update-legal-aid-providers.py

      - name: Update legal aid listings for Next.js app
        run: python web/scripts/update-legal-aid-listings-adl.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Rebuild services.csv
        run: node scripts/json-to-csv.js

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/legal_aid_providers_latest.csv data/legal_aid_providers_meta.json data/services.csv web/data/legal-aid-listings.json web/data/legal-aid-listings-meta.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/legal_aid_providers_latest.csv data/legal_aid_providers_meta.json data/services.csv web/data/legal-aid-listings.json web/data/legal-aid-listings-meta.json
          git commit -m "chore: monthly legal aid data refresh (CSV + Next.js listings)"
          git push

