# Weekly (or manual) full upsert of SRA organisations into MySQL (optional) + Meilisearch.
# Repository secrets: SRA_APIM_SUBSCRIPTION_KEY, MEILISEARCH_HOST, MEILISEARCH_API_KEY
# Optional: DATABASE_URL (mysql://…) — when set, sync writes sra_organisations before each Meili batch.

name: Sync SRA organisations to Meilisearch

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Prisma migrate (MySQL)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret not set — skipping migrate (Meilisearch-only sync)."
          else
            npx prisma migrate deploy
          fi
      - name: Fetch SRA GetAll, upsert MySQL + Meilisearch
        env:
          SRA_APIM_SUBSCRIPTION_KEY: ${{ secrets.SRA_APIM_SUBSCRIPTION_KEY }}
          MEILISEARCH_HOST: ${{ secrets.MEILISEARCH_HOST }}
          MEILISEARCH_API_KEY: ${{ secrets.MEILISEARCH_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run sra:sync
