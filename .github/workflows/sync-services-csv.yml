name: Sync services CSV

on:
  push:
    branches: [main]
    paths:
      - "data/services.json"
      - "scripts/json-to-csv.js"
      - ".github/workflows/sync-services-csv.yml"
  pull_request:
    paths:
      - "data/services.json"
      - "scripts/json-to-csv.js"
      - ".github/workflows/sync-services-csv.yml"
  workflow_dispatch:

jobs:
  build-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate CSV
        run: node scripts/json-to-csv.js

      - name: Commit updated CSV (push events only)
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- data/services.csv; then
            echo "No CSV changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/services.csv
          git commit -m "chore: sync services.csv from services.json"
          git push

